<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { background: #000000; padding: 30px; text-align: center; }
        .header h1 { color: #ffffff; margin: 0; font-weight: 900; letter-spacing: -1px; text-transform: uppercase; font-size: 24px; }
        .header h1 span { color: #007bff; }
        .content { padding: 40px; }
        .footer { background: #f8f9fa; padding: 20px; text-align: center; font-size: 12px; color: #6c757d; border-top: 1px solid #eeeeee; }
        .button { display: inline-block; padding: 14px 28px; background-color: #007bff; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 25px; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .title { font-size: 22px; font-weight: 800; color: #1a1a1a; margin-bottom: 20px; border-bottom: 3px solid #007bff; width: fit-content; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BOOK<span>NOW</span></h1>
        </div>
        <div class="content">
            {{MainContent}}
        </div>
        <div class="footer">
            &copy; {{Year}} BookNow. All rights reserved.<br/>
            Providing quality mechanic and spare parts services globally.
        </div>
    </div>
</body>
</html>
